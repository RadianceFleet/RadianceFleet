# RadianceFleet Risk Scoring Configuration
# All weights are calibrated against legitimate tanker baseline (~0–15 points for clean vessel).
# Edit these values to tune sensitivity. See PRD §7.5 for full rationale.
#
# Score bands:
#   low:      0–20    no action needed
#   medium:   21–50   investigate; check satellite data
#   high:     51–75   high confidence anomaly; publication-ready with analyst review
#   critical: 76+     strong shadow fleet indicators; escalate

# GAP DURATION
# Windward research: 8h is legitimate median. Threshold below 8h captures normal ops.
gap_duration:
  2h_to_4h: 5       # normal, track but don't elevate
  4h_to_8h: 12      # above median, worth noting
  8h_to_12h: 25     # elevated — investigate
  12h_to_24h: 40    # suspicious
  24h_plus: 55      # high-confidence indicator

# GAP FREQUENCY (rolling window, cumulative)
gap_frequency:
  2_gaps_in_7d: 18
  3_gaps_in_14d: 32
  3_gaps_in_30d: 25
  4_gaps_in_30d: 40
  5_gaps_in_30d: 50

# SPEED ANOMALY (class-specific tanker max speeds per IMO class)
speed_anomaly:
  vlcc_200k_plus_dwt:
    spike_threshold_kn: 18
    spoof_threshold_kn: 22
  suezmax_120_200k_dwt:
    spike_threshold_kn: 19
    spoof_threshold_kn: 23
  aframax_80_120k_dwt:
    spike_threshold_kn: 20
    spoof_threshold_kn: 24
  panamax_60_80k_dwt:
    spike_threshold_kn: 20
    spoof_threshold_kn: 24
  # Points
  speed_spike: 8             # > class spike threshold
  speed_spoof: 25            # > class spoof threshold
  speed_impossible: 40       # > 30 knots (any tanker)
  gap_preceded_by_speed_spike_multiplier: 1.4

# MOVEMENT ENVELOPE PLAUSIBILITY
movement_envelope:
  impossible_reappear: 40        # velocity_plausibility_ratio > 1.0
  near_impossible_reappear: 15   # ratio 0.7–1.0

# AIS SPOOFING DETECTIONS
spoofing:
  anchor_in_open_ocean: 10
  circle_pattern: 35
  slow_roll: 12
  mmsi_reuse_implied_speed_30kn: 40
  mmsi_reuse_implied_speed_100kn: 55
  nav_status_speed_mismatch: 15
  erratic_nav_status: 12
  dual_transmission_candidate: 30

# VESSEL IDENTITY CHANGES
metadata:
  single_flag_change_last_12m: 15   # 35% of shadow fleet vessels change flag exactly once (KSE)
  flag_change_in_last_30d: 25
  flag_change_in_last_7d: 35
  flag_AND_name_change_within_48h: 30
  3_plus_flag_changes_in_90d: 40
  name_change_during_active_voyage: 30
  mmsi_change_mapped_same_position: 45
  callsign_change: 20
  flag_change_from_high_risk_to_low_risk_12m: 20
  no_name_at_all: 20              # completely unnamed vessel with MMSI
  name_all_caps_numbers: 10       # pattern like "TANKER 001" or "SHIP 22" (C4ADS Unmasked)

# VESSEL CHARACTERISTICS
vessel_age:
  age_0_to_10y: -5
  age_10_to_15y: 0
  age_15_to_20y: 12      # prime shadow fleet age bracket (avg age 17y per KSE)
  age_20_to_25y: 10
  age_25_plus_y: 20
  age_25_plus_AND_high_risk_flag: 30

# FLAG STATE RISK
# High-risk registries per Paris MOU grey/black lists and investigative research
flag_state:
  white_list_flag: -10    # Norway, Denmark, Germany, Japan, Netherlands
  neutral_flag: 0         # Malta, Cyprus, Bahamas, Marshall Islands
  high_risk_registry: 15  # Cameroon, Gabon, Comoros, Gambia, Palau, Sierra Leone, Tanzania, Honduras
  flag_less_than_2y_old_AND_high_risk: 20

# VESSEL SIZE MULTIPLIER (applied to total score before bands)
vessel_size_multiplier:
  panamax_60_80k_dwt: 0.8
  aframax_80_120k_dwt: 1.0
  suezmax_120_200k_dwt: 1.2    # most common shadow fleet class
  vlcc_200k_plus_dwt: 1.3

# WATCHLIST / SANCTIONS
watchlist:
  vessel_on_ofac_sdn_list: 50
  vessel_on_eu_sanctions_list: 50
  vessel_on_kse_shadow_fleet_list: 30
  owner_or_manager_on_sanctions_list: 35

# DARK ZONE CONTEXT
dark_zone:
  gap_in_known_jamming_zone: -10          # REDUCES score (expected gap)
  gap_immediately_before_dark_zone_entry: 20
  vessel_exits_dark_zone_with_impossible_jump: 35
  selective_dark_zone_evasion: 20    # only this vessel dark while others transmit = evasion, not jamming

# STS TRANSFER INDICATORS
sts:
  sts_event_detected_ais_visible: 25
  sts_event_in_known_sts_zone: 35
  one_vessel_dark_during_proximity: 15
  gap_in_sts_tagged_corridor: 20     # reduced from 30 — already amplified by 1.5× STS corridor multiplier → effective 30
  loitering_4h_plus_in_corridor: 8
  loitering_12h_plus_in_sts_corridor: 20
  loiter_gap_loiter_pattern_48h_window: 15
  loiter_gap_loiter_full_cycle: 25     # both preceding AND following gap linked

# BEHAVIORAL PATTERNS
behavioral:
  new_mmsi_first_30d: 15
  new_mmsi_first_60d: 8
  new_mmsi_plus_russian_origin_zone: 25
  vessel_laid_up_30d_plus: 15
  vessel_laid_up_60d_plus: 25
  vessel_laid_up_in_sts_zone: 30
  suspicious_mid: 25
  russian_port_recent: 25
  russian_port_gap_sts: 40
  sts_with_sanctioned_vessel: 30
  sts_with_shadow_fleet_vessel: 20

# NEGATIVE SCORING (legitimacy signals — reduce false positives)
legitimacy:
  gap_free_90d_clean: -10
  white_flag_jurisdiction: -10
  consistent_eu_port_calls: -5    # per documented port call
  speed_variation_matches_weather: -8
  ais_class_a_consistent: -5
  psc_clean_record: -10           # 0 PSC detentions in last 3 years
  ig_pi_club_member: -15          # insured by International Group P&I club
  long_trading_history: -8        # >10 years continuous AIS history

# CORRIDOR RISK MULTIPLIER
corridor:
  known_sts_zone: 1.5
  high_risk_export_corridor: 1.5
  standard_corridor: 1.0
  legitimate_trade_route: 0.7

# SCORE BANDS
score_bands:
  low:
    min: 0
    max: 20
    label: "No action needed"
  medium:
    min: 21
    max: 50
    label: "Investigate — check satellite data"
  high:
    min: 51
    max: 75
    label: "High confidence anomaly — publication-ready with analyst review"
  critical:
    min: 76
    max: 999
    label: "Strong shadow fleet indicators — escalate"

# AIS CLASS MISMATCH
ais_class:
  large_tanker_using_class_b: 25     # mandatory Class A for >300GT; Class B = red flag
  class_switching_a_to_b: 25
  transmission_frequency_mismatch: 8

# P&I INSURANCE COVERAGE
pi_insurance:
  pi_coverage_lapsed: 20
  # pi_coverage_unknown removed — duplicated by pi_validation.unknown_insurer: 25

# PSC DETENTION
psc_detention:
  psc_detained_last_12m: 15
  psc_major_deficiencies_3_plus: 10
  multiple_detentions_2: 10           # 2 in 24 months
  multiple_detentions_3_plus: 20      # 3+ in 24 months
  detention_in_last_90d: 10           # recency
  detention_in_last_30d: 15           # strong recency
  paris_mou_ban: 15                   # ban > detention
  deficiency_count_10_plus: 8         # high deficiency count

# DARK VESSEL DETECTIONS (satellite detection with no AIS match)
dark_vessel:
  unmatched_detection_in_corridor: 35  # satellite detection with no AIS match in known corridor
  unmatched_detection_outside_corridor: 20  # satellite detection with no AIS match

# IDENTITY MERGE SIGNALS
identity_merge:
  identity_merge_detected: 30       # vessel absorbed another MMSI (confirmed identity switch)
  imo_scrapped_vessel: 35           # transmitted IMO matches a known-scrapped vessel
  imo_fabricated: 40                # IMO fails checksum validation
  gap_reactivation_in_jamming_zone: 15  # re-enables AIS in jamming zone + other risk signals

# STS PATTERN SIGNALS (Phase A6)
sts_patterns:
  repeat_sts_partnership_3plus: 30   # same two vessels doing STS 3+ times
  flag_corridor_coupling: 20         # high-risk flag vessel in geographically suspicious corridor
  invalid_metadata_generic_name: 15  # vessel has generic/placeholder name (boosted from 10)
  invalid_metadata_impossible_dwt: 15  # DWT value is physically impossible
  voyage_cycle_pattern: 30           # Russian port + STS + repeated gaps pattern

# DETECTION THRESHOLDS — loitering detector constants
# These are loaded at module init; code falls back to hardcoded defaults if missing.
detection_thresholds:
  loitering:
    sog_threshold_kn: 0.5       # SOG below which vessel is considered loitering
    min_hours: 4                # minimum consecutive hours for a loitering event
    sustained_hours: 12         # hours threshold for "sustained" (higher risk)
    risk_baseline: 8            # risk score component for ≥4h loitering
    risk_sustained: 20          # risk score component for ≥12h in corridor
    laid_up_30d_days: 30        # days threshold for 30d laid-up detection
    laid_up_60d_days: 60        # days threshold for 60d laid-up detection
    laid_up_bbox_deg: 0.033     # ±degrees positional stability (~2 nm at mid-lat)

# VESSEL HUNT SCORING (FR9) — candidate detection scoring parameters
# These are loaded at module init; code falls back to hardcoded defaults if missing.
hunt_scoring:
  length_ratio_min: 0.8        # min LOA ratio for length match (within 20%)
  length_ratio_max: 1.2        # max LOA ratio for length match
  heading_threshold: 15.0      # heading plausible score (always True for dark vessel v1.1)
  drift_multiplier: 15.0       # max drift probability score (scaled by proximity)
  class_score: 10.0            # vessel class match score
  high_score_band: 45          # score >= this -> HIGH band
  medium_score_band: 25        # score >= this -> MEDIUM band (below = LOW)

# TRACK NATURALNESS (Phase K) — Kalman filter residual analysis
# Detects pre-programmed route spoofing (synthetic tracks are too smooth)
track_naturalness:
  synthetic_track_high: 45       # 5/5 features outside natural bounds
  synthetic_track_medium: 35     # 4/5 features
  synthetic_track_low: 25        # 3/5 features

# DRAUGHT INTELLIGENCE (Phase L) — corroborating signal only
# AIS draught is manually entered; extreme swings far from port corroborate other detectors
draught:
  offshore_draught_change_corroboration: 20
  draught_swing_extreme: 25
  draught_delta_across_gap: 20
  draught_sts_confirmation: 15

# IDENTITY FRAUD (Phase M) — stateless MMSI, flag hopping, IMO fraud
identity_fraud:
  stateless_mmsi_tier1: 35       # truly unallocated MIDs
  stateless_mmsi_tier2: 20       # landlocked country MIDs on ocean tankers
  stateless_mmsi_tier3: 10       # micro-territory MIDs (corroborating)
  flag_hopping_2_in_90d: 20
  flag_hopping_3_in_90d: 40
  flag_hopping_5_in_365d: 50
  flag_hopping_to_shadow_registry: 10
  imo_simultaneous_use: 45
  imo_near_miss_qualified: 20

# DARK STS (Phase N) — hypothesis generator for satellite tasking
dark_sts:
  dark_dark_high_confidence: 30    # <5nm proximity, sufficient overlap
  dark_dark_medium_confidence: 20  # 5-15nm, converging trajectories
  dark_dark_low_confidence: 10     # 15-50nm, both high-risk
  dark_dark_draught_confirmed: 15  # draught delta corroboration

# ROUTE LAUNDERING (Stage C) — Russian-origin cargo via intermediary ports
route_laundering:
  confirmed_3_hop: 35       # Russian port -> intermediary -> sanctioned destination
  partial_2_hop: 20         # Russian port -> intermediary (no confirmed final destination)
  pattern_only: 15          # intermediary pattern without co-occurring risk signals

# P&I CLUB CYCLING (Stage C) — rapid P&I club changes indicating sanctions evasion
pi_cycling:
  rapid_change_90d: 20      # 2+ P&I club changes in 90 days
  non_ig_club: 30           # new club not in IG P&I group

# SPARSE AIS TRANSMISSION (Stage C) — minimum-rate broadcasting to avoid gaps
sparse_transmission:
  moderate_sparsity: 15     # <=2 pts/hour when underway
  severe_sparsity: 25       # <1 pt/hour when underway

# VESSEL TYPE CONSISTENCY (Stage C) — AIS type vs physical characteristics
vessel_type_consistency:
  type_dwt_mismatch: 25     # large vessel reporting non-commercial AIS type
  recent_type_change: 15    # vessel_type field changed recently

# P&I VALIDATION (Stage 2-A) — fraudulent P&I certificate detection
# 82% of shadow fleet vessels lack reputable IG P&I club coverage
pi_validation:
  unknown_insurer: 25
  known_fraudulent: 40
  no_insurer: 15

# FRAUDULENT REGISTRY (Stage 2-B) — non-operational or high-risk flag registries
fraudulent_registry:
  tier_0_fraudulent: 40
  tier_1_high_risk: 20

# STALE AIS DATA (Stage 2-C) — repeating heading/SOG/COG values
stale_ais:
  stale_data_detected: 20

# AT-SEA EXTENDED OPERATIONS (Stage 2-D) — no port call for extended period
at_sea_operations:
  no_port_call_90d: 15
  no_port_call_180d: 25
  no_port_call_365d: 35

# ISM/P&I CONTINUITY (Stage 2-E) — same manager/insurer across ownership changes
ism_continuity:
  same_ism_across_owners: 20
  same_pi_across_owners: 15
  merge_shared_ism: 10

# RENAME VELOCITY (Stage 2-F) — rapid vessel renaming patterns
rename_velocity:
  name_changes_2_per_365d: 15
  name_changes_3_per_365d: 30
  batch_rename_same_owner: 25

# DESTINATION MANIPULATION (Stage 3-A) — heading vs declared destination
destination:
  heading_to_sts_declaring_eu: 40
  blank_generic_destination: 10
  destination_changes_3_in_7d: 20

# STS RELAY CHAINS (Stage 3-B) — multi-hop transfer patterns
sts_chains:
  chain_3_hops: 20
  chain_4_plus_hops: 40
  intermediary_vessel: 15

# SCRAPPED VESSEL REGISTRY (Stage 3-C) — IMO reuse from demolished vessels
scrapped_registry:
  scrapped_imo_reuse: 50
  merge_scrapped_imo_bonus: 15

# TRACK REPLAY (Stage 3-C) — historical route pattern repetition
track_replay:
  high_correlation_replay: 45

# MERGE CHAINS (Stage 4-A) — extended MMSI identity chain detection
merge_chains:
  chain_3_hops: 15              # vessel part of 3-vessel identity chain
  chain_4_plus_hops: 25         # vessel part of 4+ vessel identity chain
  scrapped_imo_in_chain: 35     # chain includes a scrapped IMO number

# FLEET & OWNER INTELLIGENCE (Phase O) — cluster-level patterns
fleet:
  fleet_sts_concentration: 30       # 3+ vessels, same zone, 30d
  fleet_dark_coordination: 25       # 3+ vessels going dark within 48h
  fleet_flag_diversity: 20          # 4+ flags in one cluster
  fleet_high_risk_average: 15       # cluster avg risk >50
  shared_manager_different_owners: 15
  shared_pi_club_high_risk: 10

# OWNERSHIP GRAPH (Stage 5-A) — corporate ownership network analysis
ownership_graph:
  shell_chain_depth_3_plus: 20
  post_sanction_reshuffling: 20
  shared_address_sanctioned: 35
  circular_ownership: 25

# CONVOY DETECTION (Stage 5-B) — synchronized vessel movement
convoy:
  convoy_4_to_8h: 15
  convoy_8_to_24h: 25
  convoy_24h_plus: 35
  floating_storage_intermediary: 25
  arctic_no_ice_class: 25

# VOYAGE PREDICTION (Stage 5-C) — route deviation and cargo inference
voyage:
  route_deviation_toward_sts: 25
  laden_from_russian_terminal_sts: 15
  weather_speed_correction_wind: -8
  weather_speed_correction_storm: -15

# SANCTIONED PORT SCORING (Phase 6.13, OSINT Plan 1b)
# Sources: OFAC Russia Energy Sector, EU Council Reg 833/2014, CSIS maritime advisories.
# Vessels visiting Russian energy export terminals under active sanctions.
sanctioned_port:
  visit_confirmed: 50       # PortCall record directly linked to sanctioned terminal
  proximity_10nm: 25        # gap endpoint within 10nm of sanctioned terminal
  crea_confirmed: 35        # CREA Fossil Tracker voyage arrival/departure at sanctioned terminal

# TEMPORAL RECENCY MULTIPLIER (OSINT Plan 1c)
# Windward Behavioral Intelligence & Kpler 2024 consensus:
# Recent anomalies are 2x more predictive of active evasion than events >90d old.
temporal_decay:
  enabled: true
  recent_7d_multiplier: 2.0    # Active evasion window — event in last 7 days
  recent_30d_multiplier: 1.5   # Recent pattern — event in last 30 days
  baseline_90d_multiplier: 1.0 # Baseline — event in last 90 days
  old_90d_plus_multiplier: 0.8 # Historical decay — event older than 90 days

# EEZ BOUNDARY PROXIMITY (OSINT Plan 2b)
# GFW Science Advances (2022): distance to EEZ boundary is the #1 predictor
# of intentional AIS disabling (peer-reviewed, 50-80M events analysed).
#
# FALSE-POSITIVE GUARD: Both gates below are REQUIRED to prevent 85-90% FP rate.
# Baltic/North Sea legitimate routes constantly cross EEZ boundaries.
eez_proximity:
  enabled: true
  within_5nm: 25           # Highest-confidence intentional disabling (GFW tier 1)
  within_5nm_threshold: 5.0
  within_20nm: 15          # Elevated suspicion (GFW tier 2)
  within_20nm_threshold: 20.0
  # Gates: both must be satisfied before signal fires
  min_gap_duration_hours: 4    # Exclude brief comm outages / normal coverage gaps
  require_high_risk_flag: true # Only fire for Palau, Sierra Leone, Comoros, etc.

# KSE SHADOW FLEET ARCHETYPE (OSINT Plan 2a)
# KSE Institute finding: 92% of new shadow crude tankers match 3+ profile dimensions.
kse_profile:
  enabled: true
  profile_match_3: 20    # matches 3/5 shadow fleet archetype dimensions
  profile_match_4plus: 35  # matches 4-5 dimensions (high-confidence profile match)

# PER-VESSEL BEHAVIORAL BASELINE (OSINT Plan 4a)
# Windward "Patterns of Life" + ArXiv 2406.09966: per-vessel Z-score achieves
# 95% F1 score in literature vs 70-80% for fleet-wide absolute thresholds.
# Compares current gap duration to vessel's own 30-day rolling baseline.
behavioral_baseline:
  min_sample_size: 3            # Minimum historical gaps required for meaningful baseline
  min_std_hours: 0.5            # Skip if std too small (uniform gaps — not anomalous)
  sigma_2_points: 25            # >2σ deviation from own baseline
  sigma_3_points: 40            # >3σ deviation from own baseline (strong indicator)

# WATCHLIST STUB SCORING — static scoring for vessels with no AIS history
watchlist_stub_scoring:
  high_risk_flag: 15
  missing_dwt_stub: 8       # Pressure to enrich
  missing_type_stub: 5
  no_ais_history: 10        # Never seen on AIS = suspicious
  unverified_ownership: 8   # No verified owner

# FALSE POSITIVE SUPPRESSION — reduce noise from legitimate service vessels
#
# These settings reduce false positive rates for vessel types that are definitionally
# not shadow fleet actors and legitimately operate in/out of AIS coverage.
false_positive_suppression:
  # Score cap for vessels identified as non-commercial type (pilot, SAR, tug,
  # port tender, law enforcement, anti-pollution, medical, government).
  # AIS types 50-55, 58-59. These vessels legitimately transit coverage gaps
  # in harbour approach areas. Cap prevents them reaching MEDIUM or HIGH.
  non_commercial_score_cap: 30

  # Extra legitimacy discount for EU/NATO-flagged vessels (SE, DK, NO, GB, DE, etc.)
  # applied on top of the existing white_list_flag: -10 in flag_state.
  # Total effective flag discount for low-risk flags: -30.
  # Rationale: EU flag state vessels operate under strict MCA/IMO port state control —
  # dramatically lower false positive risk vs. flag-of-convenience vessels.
  low_risk_flag_extra_discount: -20

  # Fix 2: suppress data-absence signals for low-risk flag vessels.
  # Signals pi_no_insurer, at_sea_no_port_call_*, and new_mmsi_first_30d all fire when
  # data is MISSING (not when suspicious behaviour is found). For EU/NATO vessels this
  # means we haven't enriched the vessel yet, not that it's suspicious. These three signals
  # together add +65 points to every EU vessel not yet Equasis-queried.
  # Set to false to restore previous behaviour globally.
  suppress_data_absence_for_low_risk_flag: true

  # Fix 3: cap the corridor multiplier at 1.0 for EU/NATO flag vessels.
  # The ×1.5 transit/STS corridor multiplier was designed for shadow fleet dark events;
  # applying it to legitimate EU maritime traffic causes false CRITICAL scores.
  # Set to 1.5 to disable the cap.
  low_risk_flag_corridor_mult_cap: 1.0

  # Fix 4: softer score cap for ambiguous AIS type codes (90/96/99) on low-risk flag vessels.
  # Types 90/96/99 are implementation-dependent (coast guard, research, navy support) and
  # NOT added to non_commercial_score_cap because they overlap with shadow fleet vessels
  # broadcasting bad type data. This softer cap only fires for EU/NATO flag vessels.
  # Set to 200 to disable.
  ambiguous_type_low_risk_cap: 50

# DATA COMPLETENESS CAP — prevent new/under-tracked vessels from scoring CRITICAL
# Problem: a vessel seen for <14 days with <50 AIS points accumulates points from
# data absence (no P&I, no port calls, new MMSI) and reaches HIGH/CRITICAL with zero
# actual suspicious behaviour observed.
# Solution: cap score at max_score_if_incomplete unless high-confidence signals fire.
data_completeness:
  min_points: 50             # minimum AIS points for "adequately tracked"
  min_days: 14               # minimum tracking history (days since mmsi_first_seen_utc)
  max_score_if_incomplete: 50  # cap at MEDIUM band ceiling for under-tracked vessels

# CROSS-DETECTOR CORROBORATION (v3.1)
# Bonus when multiple independent detector families fire.
# Applied post-multiplier so it adds exact points without amplification.
corroboration:
  enabled: true
  families_2_bonus: 10
  families_3_bonus: 20
  families_4_bonus: 30
