# Known gas flaring platforms — used to filter false positives from VIIRS
# nighttime light detections. Detections within the exclusion radius
# (default 5 nm) of these platforms are removed.
#
# Sources: NOAA EOG Global Gas Flaring Survey, Skytruth Flaring Map
# Coordinates are approximate platform cluster centroids.

