services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: radiancefleet
      POSTGRES_PASSWORD: radiancefleet
      POSTGRES_DB: radiancefleet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiancefleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://radiancefleet:radiancefleet@db:5432/radiancefleet
    volumes:
      # Mount custom config to override baked-in defaults (optional)
      # Create this directory and copy/edit config files to customize thresholds
      - ${RADIANCEFLEET_CONFIG_DIR:-./config}:/app/backend/config:ro
    depends_on:
      db:
        condition: service_healthy

  cron:
    build: .
    entrypoint: ["uv", "run", "radiancefleet", "update", "--stream-time", "1h"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://radiancefleet:radiancefleet@db:5432/radiancefleet
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
      AISSTREAM_WORKER_ENABLED: ${AISSTREAM_WORKER_ENABLED:-false}
    volumes:
      - ${RADIANCEFLEET_CONFIG_DIR:-./config}:/app/backend/config:ro
    depends_on:
      db:
        condition: service_healthy

  ws-worker:
    build: .
    entrypoint: ["uv", "run", "radiancefleet", "worker", "start"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://radiancefleet:radiancefleet@db:5432/radiancefleet
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
    volumes:
      - ${RADIANCEFLEET_CONFIG_DIR:-./config}:/app/backend/config:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - worker

volumes:
  pgdata:
