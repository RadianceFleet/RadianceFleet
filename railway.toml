# Railway deployment configuration
# See: https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"

[[services]]
name = "web"
source = "backend"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "cron"
source = "backend"

[services.deploy]
# Runs every 4 hours: fetch watchlists + AIS data + run detection + send email notifications
cronSchedule = "0 */4 * * *"
startCommand = "radiancefleet update --stream-time 1h"
