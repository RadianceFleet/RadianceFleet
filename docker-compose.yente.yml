# Yente sanctions screening sidecar.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.yente.yml up -d
#
# Resource requirements:
#   - Elasticsearch: 2 GB heap + 2 GB OS overhead = ~4 GB RAM, 8-10 GB disk
#   - Yente service: ~500 MB RAM
#   - Minimum total: 8 GB RAM for the sidecar stack
#
# Licensing:
#   - Yente software: MIT (free)
#   - OpenSanctions data: free for non-commercial use (journalists, NGOs,
#     researchers); commercial use requires a license from OpenSanctions.
#   - OFAC SDN data: public domain (no license required)
#
# Set YENTE_ENABLED=true in your .env to activate screening in RadianceFleet.

services:
  yente:
    image: ghcr.io/opensanctions/yente:5.2.0
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment:
      YENTE_ELASTICSEARCH_URL: "http://yente-es:9200"
      YENTE_AUTO_REINDEX: "true"
    depends_on:
      yente-es:
        condition: service_healthy

  yente-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms2g -Xmx2g"
    volumes:
      - yente-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  yente-es-data:
